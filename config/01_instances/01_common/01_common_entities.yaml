input_select:
  - id: "common_mode"
    name: "Common Mode"
    provider: config
    role: output
    options: ["off", "heat", "cool"]
    initial: "off"

binary_sensor:
  - id: "general_cool_enable"
    name: "General Cool Enable"
    provider: derived
    role: internal
    dependencies:
      - common_mode
    evaluation:
      kind: equals
      target: "cool"

sensor:
  - id: "temp_corrected"
    name: "Corrected Temperature"
    provider: mqtt
    role: internal
    unit_of_measurement: "°C"
    source:
      topic: "thermo/zone/01/temp_raw/state"

